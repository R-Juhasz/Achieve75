plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" // Flutter plugin should be after Android and Kotlin plugins
}

android {
    namespace = "com.juhaszweb.achieve75"
    compileSdk = 34

    compileOptions {
        sourceCompatibility 17
        targetCompatibility 17
        coreLibraryDesugaringEnabled true // Enables Java 8+ APIs for lower Android versions
    }

    kotlinOptions {
        jvmTarget = "17" // Ensure it matches the version you’re targeting
    }

    defaultConfig {
        applicationId = "com.juhaszweb.achieve75"// Use your own app ID
        minSdk = 26
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug // Replace with release signing config as needed
        }
    }
}

dependencies {
    // Add the desugaring library for Java 8+ features
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.2'


    // Declare the Firebase libraries without versions
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-appcheck'
    // Add other Firebase dependencies as needed
}

flutter {
    source = "../.."
}

